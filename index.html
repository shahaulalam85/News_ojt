<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Header -->
  <header class="main-header">
    <div class="header-left">
      <h1 class="logo">📰 NewsFlow</h1>
    </div>

    <div class="header-right">
      <div class="search-container">
        <input type="text" id="search-input" class="search-input" placeholder="Search news...">
      </div>
      <button class="icon-btn" id="settings-btn">Settings</button>
    </div>

  </header>

  <!-- Category Bar -->
  <div class="category-bar">
    <button class="cat-btn active" data-category="all">All</button>
    <button class="cat-btn" data-category="technology">Technology</button>
    <button class="cat-btn" data-category="business">Business</button>
    <button class="cat-btn" data-category="sports">Sports</button>
    <button class="cat-btn" data-category="health">Health</button>
    <button class="cat-btn" data-category="science">Science</button>
  </div>

  <!-- Main Content -->
  <main>
    <!-- Loading State -->
    <div id="loading-state" class="hidden">
      <div class="spinner"></div>
      <p class="loading-text">Fetching latest news...</p>
    </div>

    <!-- Error State -->
    <div id="error-state" class="hidden"></div>

    <!-- News Grid -->
    <div id="news-grid" class="grid-container"></div>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 NewsFlow. Powered by NewsAPI. Crafted with premium aesthetics.</p>
  </footer>

  <!-- API Settings Modal -->
  <div id="api-modal" class="modal-overlay hidden">
    <div class="modal">
      <h2>NewsAPI Configuration</h2>

      <input type="password" id="api-key-input" placeholder="Enter API Key">

      <button id="save-api-btn">Save</button>
      <button id="close-modal-btn">Close</button>

    </div>
  </div>


  <script src="news.js" defer></script>
</body>

</html>
